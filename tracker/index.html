<!DOCTYPE html>
<meta charset="utf8">
<html>
<title> SN7 Tracker </title>
<style>
	body {
		margin: 0;
		padding: 0;
		background: #000;
		color: #0f0;
		font-family: monospace;
		overflow: hidden;
		user-select: none;
	}

	canvas {
		display: block;
		image-rendering: pixelated;
		/* Removes the tiny gap at the bottom of the image */
	}

	.editor-container {
		position: absolute;
		top: 0;
		left: 0;
		width: 100vw;
		height: 90vh;
		overflow-y: auto;
		padding: 20px;
		box-sizing: border-box;
	}

	.row-field {
		display: flex;
		align-items: center;
		margin-bottom: 10px;
	}

	.row-field label {
		width: 200px;
		color: #888;
	}

	.row-field input {
		width: 300px;
	}

	input,
	select {
		background: #111;
		border: 1px solid #333;
		color: #0f0;
		font-family: monospace;
		padding: 4px;
		margin: 2px;
	}

	.sticky-btn {
		/* 1. Normal State: Looks "raised" */
		padding: 15px 30px;
		font-size: 16px;
		font-weight: bold;
		cursor: pointer;
		border: none;
		border-radius: 8px;
		background-color: #3498db;
		color: white;

		/* Create a 3D shadow on the bottom */
		box-shadow: 0 5px #2980b9;

		/* Smooth transition for the "push" effect */
		transition: all 0.1s ease;
		outline: none;
	}

	/* Hover effect just for flair */
	.sticky-btn:hover {
		background-color: #2ecc71;
		box-shadow: 0 5px #27ae60;
	}

	/* 2. THE PRESSED STATE: Triggered by the JS class */
	.sticky-btn.active {
		background-color: #27ae60 !important;

		/* Move the button down 5px to "squash" the bottom shadow */
		transform: translateY(5px);

		/* Replace bottom shadow with an inner shadow (makes it look sunken) */
		box-shadow: inset 0 3px 8px rgba(0, 0, 0, 0.3), 0 0px #27ae60;
	}

	.instrument-sidebar {
		width: 250px;
		border-right: 1px solid #333;
		overflow-y: auto;
	}

	.instrument-item {
		padding: 8px;
		cursor: pointer;
		border-bottom: 1px solid #222;
	}

	.instrument-item.active {
		background: #1a3a5a;
		color: #fff;
	}

	.instrument-main {
		flex-grow: 1;
		display: flex;
		flex-direction: column;
		gap: 15px;
	}

	.seq-selector {
		display: flex;
		gap: 10px;
		margin-top: 10px;
	}

	.seq-tab {
		padding: 5px 15px;
		background: #222;
		cursor: pointer;
		border: 1px solid #444;
	}

	.seq-tab.active {
		background: #3498db;
		color: white;
	}
</style>

<body>
	<script type="module" src="main.js"></script>
</body>

</html>
